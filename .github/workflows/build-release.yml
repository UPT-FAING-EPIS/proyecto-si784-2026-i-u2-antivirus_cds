name: Build and Release Executable

on:
  push:
    tags:
      - 'v*' # Se ejecuta automáticamente al crear un tag como "v1.0.0"
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub Actions

jobs:
  build:
    name: Build para Windows
    runs-on: windows-latest

    permissions:
      contents: write # Permiso necesario para subir el .exe a la pestaña Releases

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Usamos versión LTS reciente de Node
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Compilar Vite y empaquetar con Electron Builder
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir ejecutables a GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
